<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Tracker - HHA/PCA Database</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; 
            background: #f9fafb;
        }
        .loading { 
            text-align: center; 
            padding: 60px 20px; 
            font-size: 18px; 
            color: #666; 
        }
        /* Custom scrollbar for modal */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }
    </style>
</head>
<body>
    <div id="root" class="loading">Loading candidate data...</div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // NEW: Form Component for Adding Candidates
        function AddCandidateModal({ isOpen, onClose, onAddSuccess }) {
            const [formData, setFormData] = useState({
                name: '', town: '', phone: '', email: '', 
                canDrive: 'No', validHHA: 'No', 
                availability: [], daysAvailable: '', 
                interviewDate: '', status: 'Pending Orientation', 
                scheduledBy: '', comments: ''
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [error, setError] = useState(null);

            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEsoCMMOG5Nmc561o5XNejBZYxXCJw-FcHM96uhHq_I8fImiRyBauJeSZ3Aw39A84LLA/exec";

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCheckboxChange = (type) => {
                setFormData(prev => {
                    const current = prev.availability;
                    const updated = current.includes(type) 
                        ? current.filter(t => t !== type)
                        : [...current, type];
                    return { ...prev, availability: updated };
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                setError(null);

                // Format data for Google Script
                const payload = {
                    ...formData,
                    availability: formData.availability.join(', ') // Convert array to comma string
                };

                try {
                    // Send POST request to Google Apps Script
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Important for Google Scripts from external domains
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(payload)
                    });

                    // no-cors means we won't get a readable response back, 
                    // but if it didn't throw an error, it likely succeeded.
                    setFormData({ // Reset form
                        name: '', town: '', phone: '', email: '', 
                        canDrive: 'No', validHHA: 'No', 
                        availability: [], daysAvailable: '', 
                        interviewDate: '', status: 'Pending Orientation', 
                        scheduledBy: '', comments: ''
                    });
                    
                    onAddSuccess(); // Triggers success message and data refresh in parent
                    setTimeout(() => onClose(), 1500); // Close after 1.5s
                    
                } catch (err) {
                    console.error("Submission error:", err);
                    setError("Failed to submit. Please try again.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                        
                        {/* Modal Header */}
                        <div className="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                            <h2 className="text-xl font-bold text-gray-800">Add New Candidate</h2>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700 transition" disabled={isSubmitting}>
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>

                        {/* Modal Body (Scrollable) */}
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                            {error && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-md text-sm">{error}</div>}
                            
                            <form id="candidateForm" onSubmit={handleSubmit} className="space-y-6">
                                
                                {/* Personal Info Section */}
                                <div>
                                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider border-b pb-2 mb-4">Personal Information</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                                            <input required type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. Jane Doe" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Town/Location *</label>
                                            <input required type="text" name="town" value={formData.town} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. Bronx" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Phone Number *</label>
                                            <input required type="tel" name="phone" value={formData.phone} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="(555) 123-4567" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                            <input type="email" name="email" value={formData.email} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="jane@example.com" />
                                        </div>
                                    </div>
                                </div>

                                {/* Qualifications Section */}
                                <div>
                                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider border-b pb-2 mb-4">Qualifications</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Valid HHA/PCA?</label>
                                            <div className="flex gap-4">
                                                <label className="flex items-center text-sm"><input type="radio" name="validHHA" value="Yes" checked={formData.validHHA === 'Yes'} onChange={handleInputChange} className="mr-2" /> Yes</label>
                                                <label className="flex items-center text-sm"><input type="radio" name="validHHA" value="No" checked={formData.validHHA === 'No'} onChange={handleInputChange} className="mr-2" /> No</label>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Can Drive?</label>
                                            <div className="flex gap-4">
                                                <label className="flex items-center text-sm"><input type="radio" name="canDrive" value="Yes" checked={formData.canDrive === 'Yes'} onChange={handleInputChange} className="mr-2" /> Yes</label>
                                                <label className="flex items-center text-sm"><input type="radio" name="canDrive" value="No" checked={formData.canDrive === 'No'} onChange={handleInputChange} className="mr-2" /> No</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Availability Section */}
                                <div>
                                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider border-b pb-2 mb-4">Availability</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Job Type (Select all that apply)</label>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                {['Hourly', 'Live-in', 'Overnight', 'Full-Time'].map(type => (
                                                    <label key={type} className="flex items-center text-sm bg-gray-50 border border-gray-200 rounded p-2 cursor-pointer hover:bg-gray-100">
                                                        <input type="checkbox" checked={formData.availability.includes(type)} onChange={() => handleCheckboxChange(type)} className="mr-2" /> {type}
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Days/Hours Available</label>
                                            <input type="text" name="daysAvailable" value={formData.daysAvailable} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. Mon-Fri 8AM-8PM" />
                                        </div>
                                    </div>
                                </div>

                                {/* Interview Section */}
                                <div>
                                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider border-b pb-2 mb-4">Interview Details</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Interview Date & Time</label>
                                            <input type="text" name="interviewDate" value={formData.interviewDate} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. Oct 15, 2026 @ 10:00 AM" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Status *</label>
                                            <select name="status" value={formData.status} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 bg-white">
                                                <option value="Hired">Hired</option>
                                                <option value="No Show">No Show</option>
                                                <option value="DNP">DNP</option>
                                                <option value="Pending Orientation">Pending Orientation</option>
                                                <option value="Rescheduled">Rescheduled</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Scheduled By</label>
                                            <input type="text" name="scheduledBy" value={formData.scheduledBy} onChange={handleInputChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="Recruiter Name" />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Comments/Notes</label>
                                            <textarea name="comments" value={formData.comments} onChange={handleInputChange} rows="3" className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="Additional details..." />
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>

                        {/* Modal Footer */}
                        <div className="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end space-x-3">
                            <button type="button" onClick={onClose} disabled={isSubmitting} className="px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-100 transition">
                                Cancel
                            </button>
                            <button type="submit" form="candidateForm" disabled={isSubmitting} className={`px-6 py-2 bg-blue-600 text-white rounded-md font-medium transition flex items-center ${isSubmitting ? 'opacity-75 cursor-not-allowed' : 'hover:bg-blue-700'}`}>
                                {isSubmitting ? (
                                    <><svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving...</>
                                ) : 'Save Candidate'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App Component
        function CandidateTracker() {
            const [candidates, setCandidates] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [availabilityFilter, setAvailabilityFilter] = useState('all');
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [showSuccessToast, setShowSuccessToast] = useState(false);

            // API Config
            const SHEET_ID = "19CkhLALHjysy8t_0SqSInO3dKdkykxfqS7ixUV54nhE";
            const API_KEY = "AIzaSyBpo-wa-aJzi5nHKGQwHYp0u8tIvzIyZ3c"; 
            const SHEET_NAME = "1: INTERVIEW";

            const fetchCandidates = async () => {
                setLoading(true);
                try {
                    const encodedTab = encodeURIComponent(SHEET_NAME);
                    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodedTab}?key=${API_KEY}`;
                    
                    const response = await axios.get(url);
                    const rows = response.data.values || [];
                    
                    if (rows.length === 0) {
                        setError('No data found in Google Sheet');
                        setLoading(false);
                        return;
                    }

                    const headers = rows[0];
                    const data = rows.slice(1).map(row => {
                        const obj = {};
                        headers.forEach((header, i) => {
                            obj[header.trim()] = row[i] ? row[i].trim() : '';
                        });
                        return obj;
                    });
                    
                    setCandidates(data.filter(d => d['NAME'] && d['NAME'] !== ''));
                    setLoading(false);
                } catch (err) {
                    console.error('Fetch Error:', err);
                    setError("Failed to load data. Check console for details.");
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (API_KEY !== "YOUR_GOOGLE_API_KEY_HERE") {
                    fetchCandidates();
                } else {
                    setError("Please configure your API key.");
                    setLoading(false);
                }
            }, []);

            const handleAddSuccess = () => {
                setShowSuccessToast(true);
                setTimeout(() => setShowSuccessToast(false), 3000);
                // Refresh data to show new candidate
                fetchCandidates();
            };

            const filteredCandidates = useMemo(() => {
                return candidates.filter(candidate => {
                    const matchesSearch = 
                        (candidate['NAME']?.toLowerCase().includes(searchTerm.toLowerCase())) ||
                        (candidate['TOWN']?.toLowerCase().includes(searchTerm.toLowerCase())) ||
                        (candidate['PHONE']?.includes(searchTerm)) ||
                        (candidate['EMAIL']?.toLowerCase().includes(searchTerm.toLowerCase()));
                    
                    const matchesStatus = statusFilter === 'all' || candidate['STATUS'] === statusFilter;
                    
                    const matchesAvailability = availabilityFilter === 'all' || 
                        (candidate['AVAILABILITY']?.includes(availabilityFilter));

                    return matchesSearch && matchesStatus && matchesAvailability;
                });
            }, [searchTerm, statusFilter, availabilityFilter, candidates]);

            const getStatusColor = (status) => {
                const s = status ? status.toUpperCase() : '';
                if (s === 'HIRED') return 'bg-green-100 text-green-800 border-green-300';
                if (s === 'NO SHOW') return 'bg-red-100 text-red-800 border-red-300';
                if (s === 'DNP') return 'bg-gray-100 text-gray-800 border-gray-300';
                if (s === 'PENDING ORIENTATION') return 'bg-yellow-100 text-yellow-800 border-yellow-300';
                if (s === 'RESCHEDULED') return 'bg-blue-100 text-blue-800 border-blue-300';
                return 'bg-gray-100 text-gray-800 border-gray-300';
            };

            const getAvailabilityTypes = () => {
                const types = new Set();
                candidates.forEach(c => {
                    if (c['AVAILABILITY']) {
                        c['AVAILABILITY'].split(',').forEach(t => types.add(t.trim()));
                    }
                });
                return Array.from(types).filter(Boolean).sort();
            };

            const getStatusTypes = () => {
                const types = new Set(candidates.map(c => c['STATUS']).filter(Boolean));
                return Array.from(types).sort();
            };

            if (error) return <div className="p-8 text-center text-red-600 font-bold">{error}</div>;
            if (loading && candidates.length === 0) return <div className="p-12 text-center text-gray-500">Loading candidates...</div>;

            return (
                <div className="min-h-screen bg-gray-50 pb-12">
                    
                    {/* Success Toast */}
                    {showSuccessToast && (
                        <div className="fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center animate-fade-in-down">
                            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                            Candidate successfully added!
                        </div>
                    )}

                    {/* Header */}
                    <div className="bg-white shadow-sm border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-4 md:px-6 py-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-900">HHA/PCA Candidate Database</h1>
                                <p className="text-gray-600 mt-2">
                                    <span className="font-semibold text-blue-600">{candidates.length}</span> candidates total
                                </p>
                            </div>
                            <button 
                                onClick={() => setIsModalOpen(true)}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-medium shadow-sm transition flex items-center"
                            >
                                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                                Add Candidate
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 md:px-6 py-6">
                        
                        {/* Search & Filters */}
                        <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-6">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Search</label>
                                    <input type="text" placeholder="Name, town, phone..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Status Filter</label>
                                    <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                                        <option value="all">All Statuses</option>
                                        {getStatusTypes().map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Job Type</label>
                                    <select value={availabilityFilter} onChange={(e) => setAvailabilityFilter(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                                        <option value="all">All Job Types</option>
                                        {getAvailabilityTypes().map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        {/* Data Table */}
                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-100 border-b border-gray-200">
                                        <tr>
                                            <th className="px-6 py-4 text-left font-semibold text-gray-700">Name & Contact</th>
                                            <th className="px-6 py-4 text-left font-semibold text-gray-700">Location</th>
                                            <th className="px-6 py-4 text-left font-semibold text-gray-700">Availability</th>
                                            <th className="px-6 py-4 text-left font-semibold text-gray-700">Interview</th>
                                            <th className="px-6 py-4 text-left font-semibold text-gray-700">Status</th>
                                            <th className="px-6 py-4 text-left font-semibold text-gray-700 w-64">Notes</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-200">
                                        {filteredCandidates.map((candidate, idx) => (
                                            <tr key={idx} className="hover:bg-blue-50/50">
                                                <td className="px-6 py-4 align-top">
                                                    <div className="font-bold text-gray-900 text-base">{candidate['NAME']}</div>
                                                    <div className="text-gray-600 mt-1">{candidate['PHONE']}</div>
                                                    {candidate['EMAIL'] && <div className="text-gray-500 text-xs truncate max-w-[200px] mt-0.5">{candidate['EMAIL']}</div>}
                                                </td>
                                                <td className="px-6 py-4 align-top">
                                                    <div className="text-gray-900 font-medium">{candidate['TOWN']}</div>
                                                    <div className="mt-2 text-xs space-y-1">
                                                        {candidate['CAN DRIVE'] === 'Yes' && <span className="inline-block bg-gray-100 text-gray-600 px-2 py-0.5 rounded mr-1">Drives</span>}
                                                        {candidate['VALID HHA/PCA'] === 'Yes' && <span className="inline-block bg-blue-50 text-blue-600 px-2 py-0.5 rounded">HHA/PCA</span>}
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4 align-top">
                                                    <div className="font-medium text-gray-800">{candidate['AVAILABILITY'] || '-'}</div>
                                                    <div className="text-gray-500 text-xs mt-1">{candidate['DAYS AVAILABLE']}</div>
                                                </td>
                                                <td className="px-6 py-4 align-top">
                                                    <div className="text-gray-800">{candidate['INTERVIEW DATE'] || '-'}</div>
                                                    {candidate['SCHEDULED BY'] && <div className="text-gray-500 text-xs mt-1">By: {candidate['SCHEDULED BY']}</div>}
                                                </td>
                                                <td className="px-6 py-4 align-top">
                                                    <span className={`px-3 py-1 rounded-full text-xs font-bold border ${getStatusColor(candidate['STATUS'])}`}>{candidate['STATUS'] || 'Unknown'}</span>
                                                </td>
                                                <td className="px-6 py-4 align-top text-gray-600 text-sm">
                                                    <div className="line-clamp-3 hover:line-clamp-none cursor-pointer" title={candidate['COMMENTS']}>{candidate['COMMENTS'] || <span className="italic text-gray-400">No notes</span>}</div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Render the Modal Component */}
                    <AddCandidateModal 
                        isOpen={isModalOpen} 
                        onClose={() => setIsModalOpen(false)} 
                        onAddSuccess={handleAddSuccess} 
                    />
                </div>
            );
        }

        ReactDOM.render(<CandidateTracker />, document.getElementById('root'));
    </script>
</body>
</html>
