<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brookville Home Care - Applicant Tracking System</title>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brookville: {
                            dark: '#1e3a8a',
                            primary: '#2563eb',
                            accent: '#0d9488',
                            light: '#f0f9ff'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { margin: 0; background: #f8fafc; color: #334155; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .stat-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        th { cursor: pointer; user-select: none; }
        th:hover { background-color: #f1f5f9; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Dashboard: () => <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>,
            Users: () => <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            Calendar: () => <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Plus: () => <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>,
            Sort: ({ active, direction }) => (
                <span className={`inline-block ml-1 ${active ? 'text-brookville-primary' : 'text-slate-300'}`}>
                    {active ? (direction === 'asc' ? '↑' : '↓') : '↕'}
                </span>
            )
        };

        function extractMonthYear(dateString) {
            if (!dateString) return 'Unscheduled';
            try {
                const cleaned = dateString.replace(/(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday|@.*)/gi, '').trim();
                const d = new Date(cleaned);
                if (!isNaN(d.getTime())) return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
                const match = dateString.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
                if (match) {
                    const year = match[3].length === 2 ? `20${match[3]}` : match[3];
                    const d2 = new Date(`${match[1]}/1/${year}`);
                    return d2.toLocaleString('en-US', { month: 'long', year: 'numeric' });
                }
            } catch (e) { return 'Other'; }
            return 'Other';
        }

        // --- COMPONENT: ADD CANDIDATE MODAL ---
        function AddCandidateModal({ isOpen, onClose, onAddSuccess }) {
            const [formData, setFormData] = useState({
                name: '', town: '', phone: '', email: '', canDrive: 'No', validHHA: 'No', 
                availability: [], daysAvailable: '', interviewDate: '', status: 'Pending Orientation', scheduledBy: '', comments: ''
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEsoCMMOG5Nmc561o5XNejBZYxXCJw-FcHM96uhHq_I8fImiRyBauJeSZ3Aw39A84LLA/exec";

            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleCheckboxChange = (type) => {
                setFormData(prev => ({ ...prev, availability: prev.availability.includes(type) ? prev.availability.filter(t => t !== type) : [...prev.availability, type] }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const payload = { ...formData, availability: formData.availability.join(', ') };
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    setFormData({ name: '', town: '', phone: '', email: '', canDrive: 'No', validHHA: 'No', availability: [], daysAvailable: '', interviewDate: '', status: 'Pending Orientation', scheduledBy: '', comments: '' });
                    onAddSuccess();
                    setTimeout(() => onClose(), 1000);
                } catch (err) { alert("Failed to submit to Google Sheets."); } 
                finally { setIsSubmitting(false); }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-slate-900 bg-opacity-75 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden">
                        <div className="px-6 py-4 border-b flex justify-between items-center bg-gradient-to-r from-brookville-dark to-brookville-primary text-white">
                            <h2 className="text-xl font-bold tracking-wide">Add New Candidate</h2>
                            <button onClick={onClose} className="text-white/80 hover:text-white"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-50">
                            <form id="candidateForm" onSubmit={handleSubmit} className="space-y-8 bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
                                {/* Basic form fields ... kept succinct for brevity, same as previous */}
                                <div>
                                    <h3 className="text-sm font-bold text-brookville-accent uppercase tracking-wider mb-4 flex items-center"><div className="w-8 h-px bg-brookville-accent mr-2"></div> Personal Details</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Full Name *</label><input required type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brookville-primary outline-none" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Phone Number *</label><input required type="tel" name="phone" value={formData.phone} onChange={handleInputChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brookville-primary outline-none" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Email</label><input type="email" name="email" value={formData.email} onChange={handleInputChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brookville-primary outline-none" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Town/Location *</label><input required type="text" name="town" value={formData.town} onChange={handleInputChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brookville-primary outline-none" /></div>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-sm font-bold text-brookville-accent uppercase tracking-wider mb-4 flex items-center"><div className="w-8 h-px bg-brookville-accent mr-2"></div> Qualifications & Availability</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-100"><label className="block text-sm font-medium text-slate-700 mb-2">Valid HHA/PCA?</label><div className="flex gap-6"><label><input type="radio" name="validHHA" value="Yes" checked={formData.validHHA === 'Yes'} onChange={handleInputChange} className="mr-2" /> Yes</label><label><input type="radio" name="validHHA" value="No" checked={formData.validHHA === 'No'} onChange={handleInputChange} className="mr-2" /> No</label></div></div>
                                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-100"><label className="block text-sm font-medium text-slate-700 mb-2">Can Drive?</label><div className="flex gap-6"><label><input type="radio" name="canDrive" value="Yes" checked={formData.canDrive === 'Yes'} onChange={handleInputChange} className="mr-2" /> Yes</label><label><input type="radio" name="canDrive" value="No" checked={formData.canDrive === 'No'} onChange={handleInputChange} className="mr-2" /> No</label></div></div>
                                    </div>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-2">Job Type</label>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                                {['Hourly', 'Live-in', 'Overnight', 'Full-Time'].map(type => (
                                                    <label key={type} className={`flex items-center justify-center py-2 px-3 text-sm rounded-lg cursor-pointer border ${formData.availability.includes(type) ? 'bg-brookville-light border-brookville-primary text-brookville-dark font-medium' : 'bg-slate-50 border-slate-200'}`}><input type="checkbox" className="hidden" checked={formData.availability.includes(type)} onChange={() => handleCheckboxChange(type)} /> {type}</label>
                                                ))}
                                            </div>
                                        </div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Specific Days/Hours</label><input type="text" name="daysAvailable" value={formData.daysAvailable} onChange={handleInputChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none" placeholder="e.g. Mon-Fri 8AM-4PM" /></div>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-sm font-bold text-brookville-accent uppercase tracking-wider mb-4 flex items-center"><div className="w-8 h-px bg-brookville-accent mr-2"></div> Pipeline Tracking</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Interview Date & Time</label><input type="text" name="interviewDate" value={formData.interviewDate} onChange={handleInputChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none" placeholder="e.g. Oct 15 @ 10:00 AM" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Scheduled By (Recruiter)</label><input type="text" name="scheduledBy" value={formData.scheduledBy} onChange={handleInputChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none" placeholder="Recruiter Name" /></div>
                                        <div className="md:col-span-2"><label className="block text-sm font-medium text-slate-700 mb-1">Current Status *</label>
                                            <select name="status" value={formData.status} onChange={handleInputChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg font-medium outline-none">
                                                <option value="Hired">✅ Hired & Working</option>
                                                <option value="Pending Orientation">⏳ Pending Orientation</option>
                                                <option value="Rescheduled">📅 Rescheduled</option>
                                                <option value="No Show">❌ No Show</option>
                                                <option value="DNP">⛔ DNP</option>
                                            </select>
                                        </div>
                                        <div className="md:col-span-2"><label className="block text-sm font-medium text-slate-700 mb-1">Comments</label><textarea name="comments" value={formData.comments} onChange={handleInputChange} rows="2" className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none" /></div>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div className="px-6 py-4 border-t bg-white flex justify-end space-x-3">
                            <button type="button" onClick={onClose} disabled={isSubmitting} className="px-5 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg">Cancel</button>
                            <button type="submit" form="candidateForm" disabled={isSubmitting} className={`px-6 py-2.5 bg-brookville-primary text-white text-sm font-bold rounded-lg shadow-md ${isSubmitting ? 'opacity-70' : 'hover:bg-blue-700'}`}>{isSubmitting ? 'Saving...' : 'Save Candidate'}</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP COMPONENT ---
        function CandidateTracker() {
            const [candidates, setCandidates] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Search, Filter & Sort State
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [sortConfig, setSortConfig] = useState({ key: 'NAME', direction: 'asc' });
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [toastMsg, setToastMsg] = useState('');

            // CONFIGURATION - MUST REPLACE
            const SHEET_ID = "19CkhLALHjysy8t_0SqSInO3dKdkykxfqS7ixUV54nhE";
            const API_KEY = "AIzaSyBpo-wa-aJzi5nHKGQwHYp0u8tIvzIyZ3c"; 
            const SHEET_NAME = "1: INTERVIEW";

            const fetchCandidates = async () => {
                try {
                    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`;
                    const response = await axios.get(url);
                    const rows = response.data.values || [];
                    if (rows.length > 0) {
                        const headers = rows[0];
                        const data = rows.slice(1).map(row => {
                            const obj = {};
                            headers.forEach((h, i) => obj[h.trim()] = row[i] ? row[i].trim() : '');
                            return obj;
                        }).filter(d => d['NAME']);
                        setCandidates(data);
                    }
                } catch (err) { console.error(err); } 
                finally { setLoading(false); }
            };

            useEffect(() => {
                if (API_KEY !== "YOUR_GOOGLE_API_KEY_HERE") fetchCandidates();
                else setLoading(false);
            }, []);

            // --- DATA ANALYTICS LOGIC ---
            const analytics = useMemo(() => {
                const total = candidates.length;
                const hired = candidates.filter(c => c['STATUS'] === 'Hired');
                const noShows = candidates.filter(c => c['STATUS'] === 'No Show').length;
                const workingRoster = hired.filter(c => c['AVAILABILITY']); 

                // Monthly Aggregation
                const monthsMap = {};
                // Recruiter Aggregation
                const recruiterMap = {};

                candidates.forEach(c => {
                    // Month Math
                    const m = extractMonthYear(c['INTERVIEW DATE'] || c['DATE']);
                    if (m !== 'Unscheduled' && m !== 'Other') {
                        if (!monthsMap[m]) monthsMap[m] = { month: m, total: 0, hired: 0, noShow: 0, pending: 0, sortDate: new Date(m) };
                        monthsMap[m].total++;
                        if (c['STATUS'] === 'Hired') monthsMap[m].hired++;
                        else if (c['STATUS'] === 'No Show') monthsMap[m].noShow++;
                        else monthsMap[m].pending++;
                    }

                    // Recruiter Math
                    const rec = c['SCHEDULED BY']?.trim() || 'Unassigned / Direct';
                    if (!recruiterMap[rec]) recruiterMap[rec] = { name: rec, totalScheduled: 0, hired: 0, noShow: 0 };
                    recruiterMap[rec].totalScheduled++;
                    if (c['STATUS'] === 'Hired') recruiterMap[rec].hired++;
                    if (c['STATUS'] === 'No Show') recruiterMap[rec].noShow++;
                });

                const monthlyData = Object.values(monthsMap).sort((a, b) => b.sortDate - a.sortDate);
                const recruiterData = Object.values(recruiterMap).sort((a, b) => b.totalScheduled - a.totalScheduled);

                return { total, hiredTotal: hired.length, noShows, workingRoster, monthlyData, recruiterData };
            }, [candidates]);

            // --- UNIVERSAL SEARCH & SORTING ---
            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const processedCandidates = useMemo(() => {
                // 1. Universal Search (searches ALL fields)
                let filtered = candidates.filter(c => {
                    const matchSearch = searchTerm === '' || Object.values(c).some(val => 
                        String(val).toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    const matchStatus = statusFilter === 'all' || c['STATUS'] === statusFilter;
                    return matchSearch && matchStatus;
                });

                // 2. Sort
                filtered.sort((a, b) => {
                    let valA = a[sortConfig.key] || '';
                    let valB = b[sortConfig.key] || '';
                    
                    // Basic string comparison
                    if (valA.toLowerCase() < valB.toLowerCase()) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (valA.toLowerCase() > valB.toLowerCase()) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });

                return filtered;
            }, [searchTerm, statusFilter, sortConfig, candidates]);

            const getStatusBadge = (status) => {
                const s = status ? status.toUpperCase() : '';
                if (s === 'HIRED') return <span className="px-2.5 py-1 bg-emerald-100 text-emerald-800 border border-emerald-200 rounded-md text-xs font-bold shadow-sm">Working</span>;
                if (s === 'NO SHOW') return <span className="px-2.5 py-1 bg-rose-100 text-rose-800 border border-rose-200 rounded-md text-xs font-bold shadow-sm">No Show</span>;
                if (s === 'DNP') return <span className="px-2.5 py-1 bg-slate-100 text-slate-800 border border-slate-200 rounded-md text-xs font-bold shadow-sm">DNP</span>;
                if (s === 'PENDING ORIENTATION') return <span className="px-2.5 py-1 bg-amber-100 text-amber-800 border border-amber-200 rounded-md text-xs font-bold shadow-sm">Pending</span>;
                return <span className="px-2.5 py-1 bg-blue-50 text-blue-700 border border-blue-200 rounded-md text-xs font-bold shadow-sm">{status || 'N/A'}</span>;
            };

            if (API_KEY === "YOUR_GOOGLE_API_KEY_HERE") {
                return <div className="p-10 text-center"><h2 className="text-2xl text-red-600 font-bold mb-4">Setup Required</h2><p>Please enter your API_KEY in the code.</p></div>;
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {toastMsg && (
                        <div className="fixed top-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-xl z-50 flex items-center font-medium">
                            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>{toastMsg}
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <div className="flex items-center">
                                    <div className="w-10 h-10 bg-brookville-dark rounded-lg flex items-center justify-center mr-4 shadow-md">
                                        <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                                    </div>
                                    <div>
                                        <h1 className="text-2xl font-extrabold text-brookville-dark tracking-tight">Brookville Home Care</h1>
                                        <p className="text-sm font-medium text-brookville-accent uppercase tracking-widest">Applicant Tracking System</p>
                                    </div>
                                </div>
                                <button onClick={() => setIsModalOpen(true)} className="hidden md:flex bg-brookville-primary hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-bold shadow-md transition items-center">
                                    <Icons.Plus /> New Candidate
                                </button>
                            </div>
                        </div>
                        <div className="bg-slate-50 border-t border-slate-200 px-4 sm:px-6 lg:px-8">
                            <div className="max-w-7xl mx-auto flex space-x-1 overflow-x-auto custom-scrollbar py-2">
                                {[{ id: 'dashboard', name: 'Owner Dashboard' }, { id: 'pipeline', name: 'Search & Pipeline' }, { id: 'roster', name: 'Active Working Roster' }].map(t => (
                                    <button key={t.id} onClick={() => setActiveTab(t.id)} className={`px-4 py-2.5 rounded-md text-sm font-bold transition ${activeTab === t.id ? 'bg-white text-brookville-primary shadow-sm border border-slate-200' : 'text-slate-600 hover:bg-slate-200'}`}>
                                        {t.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {loading ? (
                            <div className="flex flex-col items-center justify-center h-64 text-brookville-primary">
                                <svg className="animate-spin h-10 w-10 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                <span>Syncing with Google Sheets...</span>
                            </div>
                        ) : (
                            <>
                                {/* --- TAB 1: DASHBOARD --- */}
                                {activeTab === 'dashboard' && (
                                    <div className="space-y-8">
                                        {/* KPI Cards */}
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 stat-card border-l-4 border-l-brookville-dark">
                                                <p className="text-sm font-semibold text-slate-500 uppercase">Total Processed</p>
                                                <p className="text-4xl font-extrabold text-slate-900 mt-2">{analytics.total}</p>
                                            </div>
                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 stat-card border-l-4 border-l-emerald-500">
                                                <p className="text-sm font-semibold text-slate-500 uppercase">Total Hires (All Time)</p>
                                                <p className="text-4xl font-extrabold text-emerald-600 mt-2">{analytics.hiredTotal}</p>
                                            </div>
                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 stat-card border-l-4 border-l-brookville-primary">
                                                <p className="text-sm font-semibold text-slate-500 uppercase">Active Working Roster</p>
                                                <p className="text-4xl font-extrabold text-brookville-primary mt-2">{analytics.workingRoster.length}</p>
                                            </div>
                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 stat-card border-l-4 border-l-rose-500">
                                                <p className="text-sm font-semibold text-slate-500 uppercase">Total No Shows</p>
                                                <p className="text-4xl font-extrabold text-rose-600 mt-2">{analytics.noShows}</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                            {/* Recruiter Leaderboard */}
                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                                <div className="px-6 py-5 border-b border-slate-100 bg-slate-50">
                                                    <h3 className="text-lg font-bold text-slate-800">Recruiter Performance</h3>
                                                    <p className="text-sm text-slate-500">Track who is scheduling the most interviews.</p>
                                                </div>
                                                <div className="overflow-x-auto p-4">
                                                    <table className="w-full text-left border-collapse">
                                                        <thead>
                                                            <tr className="border-b-2 border-slate-200">
                                                                <th className="pb-3 text-sm font-bold text-slate-500 uppercase px-2">Recruiter / Source</th>
                                                                <th className="pb-3 text-sm font-bold text-slate-500 uppercase px-2 text-center">Scheduled</th>
                                                                <th className="pb-3 text-sm font-bold text-emerald-600 uppercase px-2 text-center">Hired</th>
                                                                <th className="pb-3 text-sm font-bold text-rose-600 uppercase px-2 text-center">No Shows</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {analytics.recruiterData.map((rec, idx) => (
                                                                <tr key={idx} className="hover:bg-slate-50">
                                                                    <td className="py-3 px-2 font-semibold text-slate-800">{rec.name}</td>
                                                                    <td className="py-3 px-2 text-center font-bold bg-slate-50 rounded">{rec.totalScheduled}</td>
                                                                    <td className="py-3 px-2 text-center font-bold text-emerald-600">{rec.hired}</td>
                                                                    <td className="py-3 px-2 text-center font-bold text-rose-600">{rec.noShow}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                            {/* Monthly Performance */}
                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                                <div className="px-6 py-5 border-b border-slate-100 bg-slate-50">
                                                    <h3 className="text-lg font-bold text-slate-800">Monthly Volume</h3>
                                                    <p className="text-sm text-slate-500">Interview and hiring metrics broken down by month.</p>
                                                </div>
                                                <div className="overflow-x-auto p-4">
                                                    <table className="w-full text-left border-collapse">
                                                        <thead>
                                                            <tr className="border-b-2 border-slate-200">
                                                                <th className="pb-3 text-sm font-bold text-slate-500 uppercase px-2">Month</th>
                                                                <th className="pb-3 text-sm font-bold text-slate-500 uppercase px-2">Scheduled</th>
                                                                <th className="pb-3 text-sm font-bold text-emerald-600 uppercase px-2">Hired</th>
                                                                <th className="pb-3 text-sm font-bold text-rose-600 uppercase px-2">No Show</th>
                                                                <th className="pb-3 text-sm font-bold text-slate-500 uppercase px-2">Rate</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {analytics.monthlyData.map((data, idx) => (
                                                                <tr key={idx} className="hover:bg-slate-50">
                                                                    <td className="py-3 px-2 font-semibold text-slate-800">{data.month}</td>
                                                                    <td className="py-3 px-2 font-medium">{data.total}</td>
                                                                    <td className="py-3 px-2 font-bold text-emerald-600">{data.hired}</td>
                                                                    <td className="py-3 px-2 font-bold text-rose-600">{data.noShow}</td>
                                                                    <td className="py-3 px-2 font-medium text-slate-600">{data.total ? Math.round((data.hired/data.total)*100) : 0}%</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* --- TAB 2: UNIVERSAL SEARCH & PIPELINE --- */}
                                {activeTab === 'pipeline' && (
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-200px)]">
                                        <div className="p-5 border-b border-slate-100 bg-slate-50 flex flex-col sm:flex-row gap-4">
                                            <div className="flex-1 relative">
                                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                    <svg className="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                                </div>
                                                <input type="text" placeholder="Universal Search (Search by name, day, recruiter, comments, etc...)" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brookville-primary outline-none font-medium text-slate-800 shadow-sm" />
                                            </div>
                                            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="w-full sm:w-56 px-4 py-2.5 bg-white border border-slate-300 rounded-lg font-medium text-slate-700 outline-none shadow-sm">
                                                <option value="all">Filter by Status (All)</option>
                                                {Array.from(new Set(candidates.map(c => c['STATUS']).filter(Boolean))).sort().map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                        <div className="overflow-y-auto flex-1 custom-scrollbar">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-slate-100 sticky top-0 z-10 border-b border-slate-200">
                                                    <tr>
                                                        <th onClick={() => handleSort('NAME')} className="px-6 py-4 font-bold text-slate-700 uppercase tracking-wider text-xs">Applicant <Icons.Sort active={sortConfig.key==='NAME'} direction={sortConfig.direction}/></th>
                                                        <th onClick={() => handleSort('PHONE')} className="px-6 py-4 font-bold text-slate-700 uppercase tracking-wider text-xs">Contact <Icons.Sort active={sortConfig.key==='PHONE'} direction={sortConfig.direction}/></th>
                                                        <th onClick={() => handleSort('AVAILABILITY')} className="px-6 py-4 font-bold text-slate-700 uppercase tracking-wider text-xs">Availability <Icons.Sort active={sortConfig.key==='AVAILABILITY'} direction={sortConfig.direction}/></th>
                                                        <th onClick={() => handleSort('INTERVIEW DATE')} className="px-6 py-4 font-bold text-slate-700 uppercase tracking-wider text-xs">Interview / Recruiter <Icons.Sort active={sortConfig.key==='INTERVIEW DATE'} direction={sortConfig.direction}/></th>
                                                        <th onClick={() => handleSort('STATUS')} className="px-6 py-4 font-bold text-slate-700 uppercase tracking-wider text-xs">Status <Icons.Sort active={sortConfig.key==='STATUS'} direction={sortConfig.direction}/></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {processedCandidates.map((c, i) => (
                                                        <tr key={i} className="hover:bg-brookville-light/40 transition">
                                                            <td className="px-6 py-4 align-top">
                                                                <div className="font-bold text-slate-900 text-base">{c['NAME']}</div>
                                                                <div className="text-slate-500 mt-1 flex items-center gap-1 text-xs"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> {c['TOWN']}</div>
                                                            </td>
                                                            <td className="px-6 py-4 align-top">
                                                                <div className="font-medium text-slate-800">{c['PHONE']}</div>
                                                                {c['EMAIL'] && <div className="text-slate-500 text-xs mt-1 truncate max-w-[150px]">{c['EMAIL']}</div>}
                                                            </td>
                                                            <td className="px-6 py-4 align-top max-w-[200px]">
                                                                <div className="font-medium text-slate-800 text-xs bg-slate-100 px-2 py-1 rounded inline-block mb-1">{c['AVAILABILITY'] || 'Unspecified'}</div>
                                                                <div className="text-slate-500 text-xs leading-tight">{c['DAYS AVAILABLE']}</div>
                                                            </td>
                                                            <td className="px-6 py-4 align-top">
                                                                <div className="font-semibold text-brookville-dark">{c['INTERVIEW DATE'] || 'Unscheduled'}</div>
                                                                <div className="text-slate-500 mt-1 text-xs font-medium bg-slate-50 inline-block px-2 py-1 rounded">{c['SCHEDULED BY'] ? `Recruiter: ${c['SCHEDULED BY']}` : 'Direct'}</div>
                                                            </td>
                                                            <td className="px-6 py-4 align-top">
                                                                {getStatusBadge(c['STATUS'])}
                                                                {c['COMMENTS'] && <div className="mt-3 text-xs text-slate-500 line-clamp-2 max-w-[250px] italic bg-yellow-50 p-2 rounded border border-yellow-100">"{c['COMMENTS']}"</div>}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {processedCandidates.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-500 font-medium">No candidates match your search criteria.</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {/* --- TAB 3: ACTIVE ROSTER --- */}
                                {activeTab === 'roster' && (
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="px-6 py-5 border-b border-slate-100 bg-gradient-to-r from-teal-50 to-white flex justify-between items-center">
                                            <div><h3 className="text-lg font-bold text-brookville-accent">Active Employee Roster</h3><p className="text-sm text-slate-500">Currently hired staff and their active schedules.</p></div>
                                            <span className="bg-emerald-100 text-emerald-800 font-bold px-4 py-2 rounded-full text-sm">{analytics.workingRoster.length} Active Staff</span>
                                        </div>
                                        <div className="p-4 bg-slate-50 border-b border-slate-100">
                                             <input type="text" placeholder="Search roster by name, day (e.g. 'Monday'), location..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full px-4 py-2 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brookville-primary outline-none shadow-sm" />
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="bg-slate-100 border-b border-slate-200">
                                                    <tr>
                                                        <th onClick={() => handleSort('NAME')} className="px-6 py-4 text-xs font-bold text-slate-700 uppercase tracking-wider">Employee <Icons.Sort active={sortConfig.key==='NAME'} direction={sortConfig.direction}/></th>
                                                        <th onClick={() => handleSort('TOWN')} className="px-6 py-4 text-xs font-bold text-slate-700 uppercase tracking-wider">Location <Icons.Sort active={sortConfig.key==='TOWN'} direction={sortConfig.direction}/></th>
                                                        <th onClick={() => handleSort('AVAILABILITY')} className="px-6 py-4 text-xs font-bold text-slate-700 uppercase tracking-wider">Job Type <Icons.Sort active={sortConfig.key==='AVAILABILITY'} direction={sortConfig.direction}/></th>
                                                        <th onClick={() => handleSort('DAYS AVAILABLE')} className="px-6 py-4 text-xs font-bold text-slate-700 uppercase tracking-wider">Schedule / Days <Icons.Sort active={sortConfig.key==='DAYS AVAILABLE'} direction={sortConfig.direction}/></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {processedCandidates.filter(c => c['STATUS'] === 'Hired').map((emp, idx) => (
                                                        <tr key={idx} className="hover:bg-slate-50">
                                                            <td className="px-6 py-4 font-bold text-slate-900">{emp['NAME']} <br/><span className="text-xs font-normal text-slate-500">{emp['PHONE']}</span></td>
                                                            <td className="px-6 py-4 font-medium text-slate-600">{emp['TOWN']}</td>
                                                            <td className="px-6 py-4"><div className="flex flex-wrap gap-1">{emp['AVAILABILITY'].split(',').map((t, i) => <span key={i} className="px-2 py-1 bg-brookville-light text-brookville-dark text-xs rounded-md font-semibold">{t.trim()}</span>)}</div></td>
                                                            <td className="px-6 py-4"><div className="font-medium text-slate-800 bg-slate-100 px-3 py-2 rounded border border-slate-200 text-sm inline-block">{emp['DAYS AVAILABLE'] || 'Flexible / Open'}</div></td>
                                                        </tr>
                                                    ))}
                                                    {processedCandidates.filter(c => c['STATUS'] === 'Hired').length === 0 && <tr><td colSpan="4" className="px-6 py-10 text-center text-slate-500">No active staff found matching that search.</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    <button onClick={() => setIsModalOpen(true)} className="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-brookville-primary text-white rounded-full shadow-2xl flex items-center justify-center">
                        <Icons.Plus />
                    </button>
                    <AddCandidateModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onAddSuccess={() => { setToastMsg("Saved!"); fetchCandidates(); setTimeout(() => setToastMsg(''), 4000); }} />
                </div>
            );
        }

        ReactDOM.render(<CandidateTracker />, document.getElementById('root'));
    </script>
</body>
</html>
